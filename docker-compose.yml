services:
  # Node.js Backend Server
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: kriptografi-server
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5001
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGIN: http://localhost
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/app/keys/ec_private.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/app/keys/ec_public.pem}
    ports:
      - "5001:5001"

    networks:
      - kriptografi-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # React Frontend (Nginx)
  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
      args:
        VITE_API_URL: http://localhost:5001
    container_name: kriptografi-client
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - kriptografi-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  kriptografi-network:
    driver: bridge
